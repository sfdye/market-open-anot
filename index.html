<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <meta name="theme-color" content="#2e7d32">
  <meta name="description" content="Check if your Singapore wet market or hawker centre is open or closed today">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/favicon.ico">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="style.css">
  <title>Market Open Anot?</title>
</head>
<body>
  <div id="app">
    <!-- Status Screen (default for returning users) -->
    <div id="status-screen" class="screen hidden">
      <header class="status-header">
        <div class="status-header-top">
          <div>
            <h1 id="app-title" class="app-title">Market Open Anot?</h1>
            <div id="today-date" class="today-date"></div>
          </div>
          <div class="header-actions">
            <button id="edit-btn" class="edit-btn hidden">Edit</button>
            <button id="reminder-btn" class="reminder-btn hidden" aria-label="Reminders"></button>
            <button id="lang-toggle" class="lang-toggle" aria-label="Switch language">中文</button>
          </div>
        </div>
      </header>
      <div id="reminder-card" class="reminder-card hidden">
        <div class="reminder-card-icon">🔔</div>
        <div class="reminder-card-body">
          <div class="reminder-card-heading">
            <span id="reminder-card-title" class="reminder-card-title">Get closure reminders</span>
            <span id="reminder-card-badge" class="reminder-badge">Experimental</span>
          </div>
          <p id="reminder-card-desc" class="reminder-card-desc">Get a heads-up the day before a market you follow closes.</p>
          <div class="reminder-card-actions">
            <button id="reminder-enable-btn" class="reminder-enable-btn">Enable</button>
            <button id="reminder-dismiss-btn" class="reminder-dismiss-btn">Not now</button>
          </div>
        </div>
      </div>
      <main id="market-cards" class="market-cards" aria-live="polite"></main>
      <footer id="status-footer" class="status-footer">
        <button id="add-markets-btn" class="btn-primary">+ Add Markets</button>
        <button id="remove-all-btn" class="btn-danger hidden">Remove all</button>
      </footer>
      <div id="data-source" class="data-source"></div>
      <footer class="app-footer">
        <p>Made by <a href="https://github.com/sfdye" target="_blank">@sfdye</a> · <a href="https://github.com/sfdye/market-open-anot" target="_blank">Source</a> · <a href="mailto:t@sfdye.com">Feedback</a></p>
      </footer>
    </div>

    <!-- Picker Screen -->
    <div id="picker-screen" class="screen hidden">
      <header class="picker-header">
        <div class="picker-header-top">
          <div class="picker-header-left">
            <button id="back-btn" class="back-btn" aria-label="Back">←</button>
            <h1 id="picker-title">Choose Your Markets</h1>
          </div>
          <button id="lang-toggle-picker" class="lang-toggle" aria-label="Switch language">中文</button>
        </div>
        <p id="picker-subtitle" class="subtitle">Tap to add to favorites</p>
      </header>
      <div class="search-container">
        <div class="search-row">
          <input type="search" id="search-input" class="search-input" placeholder="Search..." autocomplete="off">
          <button id="view-toggle" class="view-toggle" aria-label="Toggle map view">🗺️</button>
        </div>
      </div>
      <ul id="market-list" class="market-list"></ul>
      <div id="market-map" class="market-map hidden"></div>
      <footer class="picker-footer">
        <button id="done-btn" class="btn-primary hidden">Done</button>
      </footer>
    </div>
  </div>

  <!-- Install Prompt -->
  <div id="install-prompt" class="install-prompt hidden">
    <div class="install-backdrop"></div>
    <div class="install-sheet">
      <div class="install-body">
        <div class="install-icon">📲</div>
        <h2 id="install-title" class="install-title">Add to Home Screen</h2>
        <p id="install-desc" class="install-desc">Install this app for quick access and a full-screen experience.</p>
        <div id="install-steps" class="install-steps"></div>
      </div>
      <button id="install-action-btn" class="install-btn">Install</button>
      <button id="install-dismiss-btn" class="install-dismiss">Not now</button>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="market-logic.js"></script>
  <script src="zh-names.js"></script>
  <script src="push.js"></script>
  <script src="install-prompt.js"></script>
  <script src="app.js"></script>
</body>
</html>
